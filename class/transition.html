<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moving Square</title>

    <style>
        body{
            margin: 0;
            padding: 40px;
            overflow-x: hidden;
        }

        .square{
            width: 200px;
            height: 200px;
            background-color: blue;
            color: white;
            font-size: 3rem;
            text-align: center;
            line-height: 200px;

            animation: move 2s infinite alternate ease-in-out;
        }

        @keyframes move{
            from{
                transform: translateX(0);
            }

            to{
                transform: translateX(500px);
            }
        }
    </style>
</head>
<body>

    <div class="square">Hi</div>

</body>
</html>
